<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>경제 금융 용어집 - Economic Hub</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .search-container {
      margin-bottom: 32px;
      position: sticky;
      top: 80px;
      z-index: 100;
      background: var(--container-bg);
      padding: 10px 0;
    }
    .search-input {
      width: 100%;
      padding: 16px 24px;
      border-radius: 16px;
      border: 2px solid var(--set-border);
      background: var(--set-bg);
      color: var(--text-primary);
      font-size: 16px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .search-input:focus {
      border-color: var(--accent-color);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
    }
    .glossary-list {
      display: grid;
      gap: 16px;
    }
    .glossary-item {
      padding: 24px;
      background: var(--set-bg);
      border: 1px solid var(--set-border);
      border-radius: 16px;
      transition: transform 0.2s;
    }
    .glossary-item h3 {
      font-size: 18px;
      margin: 0 0 12px;
      color: var(--accent-color);
    }
    .glossary-item p {
      font-size: 15px;
      line-height: 1.6;
      color: var(--text-primary);
      margin: 0;
    }
    .no-results {
      text-align: center;
      padding: 48px;
      color: var(--text-secondary);
      display: none;
    }
    .highlight {
      background: rgba(255, 215, 0, 0.3);
      padding: 2px 4px;
      border-radius: 4px;
    }
  </style>
</head>

<body>
  <nav class="navbar">
    <div class="nav-container">
      <a href="index.html" class="nav-logo">GEA Hub</a>
      <ul class="nav-links">
        <li><a href="index.html#daily-issue">오늘의이슈</a></li>
        <li><a href="learning.html">학습자료</a></li>
        <li><a href="glossary.html" style="color: var(--accent-color);">용어집</a></li>
        <li><a href="index.html#weekly">주간요약</a></li>
      </ul>
      <button id="modeToggle" class="mode-toggle">☀️</button>
    </div>
  </nav>

  <main class="container">
    <header class="hub-header">
      <h1>📖 경제 금융 용어 700선</h1>
      <p>한국은행 등 주요 기관에서 선정한 핵심 경제 금융 용어를 검색해 보세요.</p>
    </header>

    <div class="search-container">
      <input type="text" id="searchInput" class="search-input" placeholder="찾으시는 용어를 입력하세요 (예: 가계부채, GDP, 디파이)">
    </div>

    <div id="glossaryList" class="glossary-list">
      <!-- 용어들이 여기에 렌더링됨 -->
    </div>
    
    <div id="noResults" class="no-results">
      검색 결과가 없습니다. 다른 검색어를 입력해 보세요.
    </div>

    <footer class="footer">
      <p>&copy; 2026 Economic Hub. Created by KDH</p>
    </footer>
  </main>

  <script>
    // --- 용어 데이터 (핵심 샘플 20선) ---
    // 실제 700선을 모두 넣기 위해서는 별도의 JSON 파일로 관리하거나 아래 배열을 확장하시면 됩니다.
    const terms = [
      { term: "가계부채", definition: "가계가 금융기관으로부터 빌린 대출금과 신용카드 사용액 등을 합친 금액입니다." },
      { term: "GDP (국내총생산)", definition: "한 나라의 영역 내에서 모든 경제 주체가 일정 기간 동안 생산한 재화와 서비스의 부가가치를 합산한 것입니다." },
      { term: "인플레이션", definition: "물가가 지속적으로 상승하여 화폐의 가치가 하락하는 현상을 말합니다." },
      { term: "디플레이션", definition: "물가가 지속적으로 하락하여 경제 활동이 위축되는 현상을 말합니다." },
      { term: "기준금리", definition: "중앙은행이 경제 상황에 맞춰 결정하는 핵심 금리로, 시중 금리의 기준이 됩니다." },
      { term: "양적 완화 (QE)", definition: "중앙은행이 시장에 직접 돈을 풀어 경기를 부양하는 통화 정책입니다." },
      { term: "스태그플레이션", definition: "경기 불황(Stagnation)과 물가 상승(Inflation)이 동시에 발생하는 현상입니다." },
      { term: "경상수지", definition: "국가 간의 상품, 서비스 거래 및 소득 이동의 결과로 발생하는 수지입니다." },
      { term: "기축통화", definition: "국제 결제나 금융 거래의 기본이 되는 통화로, 현재는 미국의 달러화가 대표적입니다." },
      { term: "공매도", definition: "주가 하락을 예상하고 주식을 빌려서 판 뒤, 나중에 싼 가격에 사서 갚는 투자 기법입니다." },
      { term: "LTV (주택담보대출비율)", definition: "주택 가격 대비 대출받을 수 있는 금액의 비율입니다." },
      { term: "DSR (총부채원리금상환비율)", definition: "모든 대출의 원리금 상환액이 연간 소득에서 차지하는 비중입니다." },
      { term: "환율", definition: "서로 다른 두 국가의 화폐 사이의 교환 비율입니다." },
      { term: "낙수효과", definition: "대기업이나 고소득층의 소득 증대가 저소득층에게도 혜택으로 돌아가는 현상을 말합니다." },
      { term: "디파이 (DeFi)", definition: "블록체인 기술을 활용한 탈중앙화 금융 서비스를 의미합니다." },
      { term: "CBDC", definition: "중앙은행이 발행하는 디지털 화폐입니다." },
      { term: "매파 / 비둘기파", definition: "금리 인상과 긴축을 선호하면 매파, 금리 인하와 완화를 선호하면 비둘기파로 부릅니다." },
      { term: "금산분리", definition: "금융 자본과 산업 자본이 서로의 업종을 지배하지 못하도록 분리하는 원칙입니다." },
      { term: "예대금리차", definition: "대출 금리에서 예금 금리를 뺀 차이로, 은행의 주요 수익원이 됩니다." },
      { term: "코스피 (KOSPI)", definition: "한국 거래소에 상장된 종합 주가 지수입니다." }
    ];

    const glossaryList = document.getElementById("glossaryList");
    const searchInput = document.getElementById("searchInput");
    const noResults = document.getElementById("noResults");

    function renderTerms(filteredTerms, query = "") {
      glossaryList.innerHTML = "";
      if (filteredTerms.length === 0) {
        noResults.style.display = "block";
        return;
      }
      noResults.style.display = "none";

      filteredTerms.forEach(item => {
        const itemDiv = document.createElement("div");
        itemDiv.className = "glossary-item";
        
        let title = item.term;
        let desc = item.definition;

        if (query) {
          const regex = new RegExp(`(${query})`, "gi");
          title = title.replace(regex, `<span class="highlight">$1</span>`);
          desc = desc.replace(regex, `<span class="highlight">$1</span>`);
        }

        itemDiv.innerHTML = `
          <h3>${title}</h3>
          <p>${desc}</p>
        `;
        glossaryList.appendChild(itemDiv);
      });
    }

    searchInput.addEventListener("input", (e) => {
      const query = e.target.value.toLowerCase().trim();
      const filtered = terms.filter(t => 
        t.term.toLowerCase().includes(query) || 
        t.definition.toLowerCase().includes(query)
      );
      renderTerms(filtered, query);
    });

    // 초기 렌더링
    renderTerms(terms);

    // 다크모드 로직
    const modeToggle = document.getElementById("modeToggle");
    function initDarkMode() {
      const isDark = localStorage.getItem("darkMode") === "true" || 
                     (!localStorage.getItem("darkMode") && window.matchMedia("(prefers-color-scheme: dark)").matches);
      if (isDark) { document.body.classList.add("dark-mode"); modeToggle.textContent = "🌙"; }
    }
    modeToggle.addEventListener("click", () => {
      const isDark = document.body.classList.toggle("dark-mode");
      localStorage.setItem("darkMode", isDark);
      modeToggle.textContent = isDark ? "🌙" : "☀️";
    });
    initDarkMode();
  </script>
</body>
</html>
