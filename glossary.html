<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>경제 금융 용어 700선 - GEA Hub</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .search-sticky {
      position: sticky;
      top: 70px;
      z-index: 100;
      background: var(--container-bg);
      padding: 16px 0;
      border-bottom: 1px dashed var(--container-border);
    }
    .search-input {
      width: 100%;
      padding: 12px 18px;
      border-radius: 10px;
      border: 1px solid var(--set-border);
      background: var(--set-bg);
      color: var(--text-primary);
      font-size: 14px;
      outline: none;
      transition: all 0.2s;
    }
    .search-input:focus {
      border-color: var(--accent-color);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
    }

    .glossary-scroll-container {
      max-height: 500px;
      overflow-y: auto;
      margin-top: 16px;
      border: 1px solid var(--set-border);
      border-radius: 12px;
      background: var(--set-bg);
    }

    /* 커스텀 스크롤바 */
    .glossary-scroll-container::-webkit-scrollbar { width: 6px; }
    .glossary-scroll-container::-webkit-scrollbar-thumb { background: var(--set-border); border-radius: 10px; }

    .glossary-list { display: grid; gap: 0; }
    .glossary-item {
      padding: 12px 16px;
      border-bottom: 1px solid var(--set-border);
      transition: background 0.1s;
    }
    .glossary-item:last-child { border-bottom: none; }
    .glossary-item:hover { background: var(--ai-bg); }
    .glossary-item h3 {
      font-size: 14px;
      margin: 0 0 4px;
      color: var(--accent-color);
      font-weight: 700;
    }
    .glossary-item p {
      font-size: 12.5px;
      line-height: 1.5;
      color: var(--text-primary);
      margin: 0;
      opacity: 0.85;
    }

    .no-results { text-align: center; padding: 30px; color: var(--text-secondary); display: none; }
    .highlight { background: rgba(255, 215, 0, 0.4); color: #000; border-radius: 2px; }
    .term-count { font-size: 11px; color: var(--text-secondary); margin-bottom: 8px; display: block; }
  </style>
</head>

<body>
  <nav class="navbar">
    <div class="nav-container">
      <a href="index.html" class="nav-logo">GEA Hub</a>
      <ul class="nav-links">
        <li><a href="index.html#daily-issue">오늘의이슈</a></li>
        <li><a href="learning.html">학습자료</a></li>
        <li><a href="glossary.html" style="color: var(--accent-color);">용어집</a></li>
        <li><a href="index.html#weekly">주간요약</a></li>
      </ul>
      <button id="modeToggle" class="mode-toggle">☀️</button>
      <div id="google_translate_element" style="margin-left: 15px;"></div>
    </div>
  </nav>

  <main class="container">
    <header class="hub-header" style="margin-bottom: 24px;">
      <h1 style="font-size: 28px;">📖 경제 금융 용어 사전</h1>
      <p style="font-size: 15px;">한국은행 '경제금융용어 700선' 기반 핵심 용어 요약</p>
    </header>

    <div class="search-sticky">
      <span id="termCount" class="term-count">로드 중...</span>
      <input type="text" id="searchInput" class="search-input" placeholder="용어 또는 키워드를 입력하세요...">
    </div>

    <div class="glossary-scroll-container">
      <div id="glossaryList" class="glossary-list"></div>
      <div id="noResults" class="no-results">검색 결과가 없습니다.</div>
    </div>

    <footer class="footer">
      <p>&copy; 2026 GEA Hub. Created by KDH</p>
    </footer>
  </main>

  <script>
    // --- 한국은행 경제금융용어 핵심 리스트 ---
    const allTerms = [
      { term: "가산금리 (Spread)", definition: "기준금리에 신용도 등의 차이에 따라 덧붙이는 금리입니다." },
      { term: "가계부실위험지수 (HDRI)", definition: "가구의 소득과 자산 상태를 고려하여 채무상환 능력을 평가하는 지표입니다." },
      { term: "가교은행 (Bridge Bank)", definition: "청산 대상 은행의 자산과 부채를 일시적으로 인수하여 운영하는 임시 은행입니다." },
      { term: "경기동향지수 (Index of Coincident Indicators)", definition: "경기의 흐름을 파악하기 위해 주요 경제 지표들을 가공하여 만든 지수입니다." },
      { term: "경상수지 (Current Account Balance)", definition: "국가 간 상품, 서비스 거래 및 소득 이동의 결과로 발생하는 수지입니다." },
      { term: "고용률", definition: "15세 이상 인구 중 취업자가 차지하는 비율입니다." },
      { term: "고정금리", definition: "대출 기간 동안 금리가 변하지 않고 고정되는 금리 방식입니다." },
      { term: "골디락스경제 (Goldilocks Economy)", definition: "너무 뜨겁지도 차갑지도 않은, 이상적인 경제 성장 상태를 말합니다." },
      { term: "공매도 (Short Selling)", definition: "주식을 빌려서 판 뒤, 주가가 떨어지면 싸게 사서 갚는 투자 기법입니다." },
      { term: "국가신용등급", definition: "한 국가가 채무를 이행할 능력과 의사가 얼마나 있는지를 등급으로 나타낸 것입니다." },
      { term: "국채", definition: "정부가 자금을 조달하기 위해 발행하는 채권입니다." },
      { term: "금본위제", definition: "화폐의 가치를 금의 가치에 고정시키는 제도입니다." },
      { term: "금산분리", definition: "산업 자본과 금융 자본이 서로를 소유하지 못하게 차단하는 원칙입니다." },
      { term: "기업공개 (IPO)", definition: "기업이 주식을 외부 투자자들에게 공개적으로 매도하는 과정입니다." },
      { term: "기준금리 (Base Rate)", definition: "중앙은행이 결정하는 통화 정책의 기준이 되는 금리입니다." },
      { term: "기축통화 (Key Currency)", definition: "국제 결제 및 금융 거래의 기본이 되는 통화입니다. (예: 달러)" },
      { term: "낙수효과 (Trickle-down Effect)", definition: "대기업과 고소득층의 성장이 저소득층에게도 혜택으로 돌아가는 현상입니다." },
      { term: "단기금융시장 (Money Market)", definition: "만기 1년 미만의 금융 상품이 거래되는 시장입니다." },
      { term: "더블딥 (Double Dip)", definition: "경기가 회복되다 다시 침체에 빠지는 이중 하강 현상입니다." },
      { term: "디커플링 (Decoupling)", definition: "국가 간 또는 지표 간의 흐름이 서로 다르게 나타나는 탈동조화 현상입니다." },
      { term: "디플레이션 (Deflation)", definition: "물가가 지속적으로 하락하여 경제 활동이 위축되는 현상입니다." },
      { term: "레버리지 효과 (Leverage Effect)", definition: "부채를 활용하여 자산 수익률을 극대화하는 효과입니다." },
      { term: "매몰비용 (Sunk Cost)", definition: "이미 지출되어 다시 회수할 수 없는 비용입니다." },
      { term: "뱅크런 (Bank Run)", definition: "은행의 예금자들이 예금을 한꺼번에 인출하는 대량 예금 인출 현상입니다." },
      { term: "변동금리", definition: "시중 금리 변화에 따라 대출 금리가 주기적으로 변하는 방식입니다." },
      { term: "보호무역주의", definition: "자국 산업 보호를 위해 관세 장벽 등을 세우는 무역 정책입니다." },
      { term: "본원통화 (Monetary Base)", definition: "중앙은행이 발행하여 시중에 공급한 현금 통화입니다." },
      { term: "부채비율", definition: "자기자본 대비 부채가 차지하는 비중입니다." },
      { term: "분수효과 (Trickle-up Effect)", definition: "저소득층의 소득 증대가 전체 경제 성장을 이끄는 현상입니다." },
      { term: "빅맥지수 (Big Mac Index)", definition: "맥도날드 빅맥 가격을 통해 각국 화폐의 구매력을 비교하는 지수입니다." },
      { term: "상장지수펀드 (ETF)", definition: "주식처럼 거래소에서 실시간으로 거래되는 인덱스 펀드입니다." },
      { term: "서킷브레이커 (Circuit Breaker)", definition: "주가 급락 시 시장의 충격을 완화하기 위해 매매를 일시 중단하는 제도입니다." },
      { term: "소득주도성장", definition: "가계의 가처분 소득을 늘려 소비를 촉진하고 성장을 유도하는 정책입니다." },
      { term: "스왑 (Swap)", definition: "서로 다른 통화나 금리 조건을 일정 기간 바꾸기로 하는 거래입니다." },
      { term: "시뇨리지 (Seigniorage)", definition: "화폐를 발행함으로써 얻는 이익을 의미합니다." },
      { term: "양적 완화 (QE)", definition: "중앙은행이 시장에 직접 자금을 공급하여 경기를 부양하는 정책입니다." },
      { term: "어음관리계좌 (CMA)", definition: "금융기관이 예탁금을 운용하여 수익을 돌려주는 단기 투자 상품입니다." },
      { term: "연방준비제도 (Fed)", definition: "미국의 중앙은행 제도를 말합니다." },
      { term: "역모기지론", definition: "보유한 주택을 담보로 노후 생활 자금을 지급받는 대출입니다." },
      { term: "유동성 (Liquidity)", definition: "자산을 현금으로 전환할 수 있는 정도를 의미합니다." },
      { term: "자기자본비율 (BIS)", definition: "은행의 위험 자산 대비 자기자본이 차지하는 비율입니다." },
      { term: "장단기금리차", definition: "장기 금리와 단기 금리의 차이로, 경기 예측 지표로 활용됩니다." },
      { term: "제로금리정책", definition: "단기 금리를 0%에 가깝게 유지하는 통화 정책입니다." },
      { term: "주가수익비율 (PER)", definition: "주가를 주당순이익으로 나눈 값으로, 주식의 가치 평가 지표입니다." },
      { term: "중앙은행", definition: "통화 발행 및 통화 정책을 담당하는 국가의 핵심 금융 기관입니다." },
      { term: "지주회사 (Holding Company)", definition: "다른 회사의 주식을 소유함으로써 그 회사를 지배하는 것을 목적으로 하는 회사입니다." },
      { term: "통화스왑", definition: "서로 다른 통화를 미리 정한 환율에 따라 교환하는 거래입니다." },
      { term: "파생금융상품 (Derivatives)", definition: "기초 자산의 가치 변화에 따라 가격이 결정되는 금융 상품입니다." },
      { term: "평가절하 (Devaluation)", definition: "자국 화폐의 대외 가치를 인위적으로 낮추는 것입니다." },
      { term: "헤지펀드 (Hedge Fund)", definition: "단기 이익을 목적으로 고위험·고수익을 추구하는 사모 투자 펀드입니다." },
      { term: "환율조작국", definition: "자국 수출에 유리하게 환율을 인위적으로 조작하는 국가를 말합니다." },
      { term: "M&A (기업인수합병)", definition: "기업의 경영권을 인수하거나 기업 간에 합병하는 행위입니다." }
    ];

    const glossaryList = document.getElementById("glossaryList");
    const searchInput = document.getElementById("searchInput");
    const noResults = document.getElementById("noResults");
    const termCount = document.getElementById("termCount");

    function renderTerms(filteredTerms, query = "") {
      glossaryList.innerHTML = "";
      termCount.textContent = `총 700선 중 ${filteredTerms.length}개의 용어 표시 중`;

      if (filteredTerms.length === 0) {
        noResults.style.display = "block";
        return;
      }
      noResults.style.display = "none";

      filteredTerms.forEach(item => {
        const itemDiv = document.createElement("div");
        itemDiv.className = "glossary-item";
        
        let title = item.term;
        let desc = item.definition;

        if (query) {
          const regex = new RegExp(`(${query})`, "gi");
          title = title.replace(regex, `<span class="highlight">$1</span>`);
          desc = desc.replace(regex, `<span class="highlight">$1</span>`);
        }

        itemDiv.innerHTML = `
          <h3>${title}</h3>
          <p>${desc}</p>
        `;
        glossaryList.appendChild(itemDiv);
      });
    }

    searchInput.addEventListener("input", (e) => {
      const query = e.target.value.toLowerCase().trim();
      const filtered = allTerms.filter(t => 
        t.term.toLowerCase().includes(query) || 
        t.definition.toLowerCase().includes(query)
      );
      renderTerms(filtered, query);
    });

    renderTerms(allTerms);

    function googleTranslateElementInit() {
      new google.translate.TranslateElement({pageLanguage: 'ko', layout: google.translate.TranslateElement.InlineLayout.SIMPLE}, 'google_translate_element');
    }
  </script>
  <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
  <script src="theme.js"></script>
</body>
</html>
