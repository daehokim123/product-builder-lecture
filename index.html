<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로또 번호 추천기</title>
  <meta name="google-adsense-account" content="ca-pub-2318911583209270">
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2318911583209270"
     crossorigin="anonymous"></script>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <main class="container">
    <button id="modeToggle" class="mode-toggle" aria-label="다크 모드 토글">☀️</button>
    <div class="header">
      <h1>로또 번호 추천기</h1>
      <p>버튼을 누르면 중복 없는 로또 번호 5세트를 한 번에 추천합니다.</p>
    </div>

    <section id="lottoNumbers" class="lotto-list" aria-live="polite"></section>

    <button type="button" id="generateButton">번호 5세트 추천받기</button>

    <div class="note">
      ※ 이 번호는 무작위 추천이며 당첨을 보장하지 않습니다.
    </div>

    <section class="contact-section">
      <h2>🤝 제휴 및 비즈니스 문의</h2>
      <form id="contactForm" class="contact-form" action="https://formspree.io/f/xnjwjlny" method="POST">
        <div class="form-group">
          <label for="name">성함/업체명</label>
          <input type="text" id="name" name="name" placeholder="예: 홍길동" required>
        </div>
        <div class="form-group">
          <label for="email">이메일 주소</label>
          <input type="email" id="email" name="email" placeholder="example@email.com" required>
        </div>
        <div class="form-group">
          <label for="message">문의 내용</label>
          <textarea id="message" name="message" rows="4" placeholder="문의하실 내용을 입력해 주세요." required></textarea>
        </div>
        <button type="submit" class="submit-btn">문의 보내기</button>
      </form>
    </section>

    <section class="comments-section" style="margin-top: 40px; padding-top: 32px; border-top: 1px dashed var(--container-border);">
      <div id="disqus_thread"></div>
      <script>
          /**

          var d = document, s = d.createElement('script');
          s.src = 'https://productbuilder-f98wrz4nfr.disqus.com/embed.js';

          (d.head || d.body).appendChild(s);
          })();
      </script>
      <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
    </section>

    <footer style="text-align: center; margin-top: 20px; font-size: 12px; opacity: 0.6; font-weight: bold;">
      Created by KDH
    </footer>
  </main>

  <script src="script.js"></script>
</body>
</html>
