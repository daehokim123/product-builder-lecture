<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>오늘의 이슈 - Economic Hub</title>
  <meta name="description" content="오늘의 글로벌 및 한국 경제 핵심 이슈와 시장에 미치는 영향을 정리합니다.">
  <meta name="google-adsense-account" content="ca-pub-2318911583209270">
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2318911583209270"
     crossorigin="anonymous"></script>
  <link rel="stylesheet" href="style.css">
  <style>
    .daily-layout {
      display: grid;
      gap: 28px;
    }

    .daily-lead {
      padding: 24px;
      background: var(--hero-bg);
      border: 1px solid var(--container-border);
      border-radius: 14px;
    }

    .daily-lead h1 {
      margin: 0 0 12px;
      color: var(--text-header);
      font-size: clamp(28px, 5vw, 40px);
      line-height: 1.2;
    }

    .daily-lead p {
      margin: 0;
      color: var(--text-secondary);
      font-size: 17px;
      line-height: 1.7;
    }

    .daily-toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 14px;
      padding: 16px;
      background: var(--set-bg);
      border: 1px solid var(--set-border);
      border-radius: 12px;
    }

    .daily-toolbar strong {
      color: var(--text-header);
    }

    .impact-list {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 14px;
      margin-top: 18px;
    }

    .impact-item {
      padding: 16px;
      background: var(--set-bg);
      border: 1px solid var(--set-border);
      border-radius: 12px;
    }

    .impact-item strong {
      display: block;
      color: var(--text-header);
      margin-bottom: 6px;
    }

    .impact-item span {
      color: var(--text-secondary);
      font-size: 14px;
      line-height: 1.6;
    }
  </style>
</head>

<body>
  <nav class="navbar">
    <div class="nav-container">
      <a href="index.html" class="nav-logo">GEA Hub</a>
      <ul class="nav-links">
        <li><a href="daily.html">오늘의 이슈</a></li>
        <li><a href="articles.html">경제 리포트</a></li>
        <li><a href="learning.html">학습자료</a></li>
        <li><a href="market.html">시장 데이터</a></li>
        <li><a href="glossary.html">용어집</a></li>
        <li><a href="about.html">소개</a></li>
      </ul>
      <button id="modeToggle" class="mode-toggle" aria-label="다크 모드 토글" title="화면 모드 변경">☀</button>
    </div>
  </nav>

  <main class="container">
    <a href="index.html" class="text-link">메인으로 돌아가기</a>

    <div class="daily-layout">
      <header class="daily-lead">
        <p class="eyebrow">Daily Brief</p>
        <h1>오늘의 경제 이슈</h1>
        <p>매일 확인해야 할 글로벌 및 한국 경제 이슈를 핵심 맥락과 함께 정리합니다.</p>
      </header>

      <div class="daily-toolbar">
        <strong id="selectedDateLabel">최신 이슈</strong>
        <div class="archive-selector">
          <select id="dailyPageSelector" aria-label="이전 이슈 선택"></select>
        </div>
      </div>

      <section class="issue-group">
        <h3>글로벌 이슈</h3>
        <div id="globalIssues" class="card-grid"></div>
      </section>

      <section class="issue-group">
        <h3>한국 이슈</h3>
        <div id="koreaIssues" class="card-grid"></div>
      </section>

      <section class="issue-group">
        <h3>시장 체크포인트</h3>
        <div id="impactList" class="impact-list"></div>
      </section>
    </div>

    <footer class="footer">
      <p>&copy; 2026 Economic Hub. Created by KDH</p>
      <p class="footer-links">
        <a href="privacy.html">개인정보처리방침</a>
        <a href="contact.html">문의</a>
        <a href="about.html">사이트 소개</a>
        <a href="articles.html">경제 리포트</a>
      </p>
    </footer>
  </main>

  <script>
    const dailyIssues = [
      {
        date: "2026-05-04",
        global: [
          {
            title: "미·EU 긴축 완화 기대",
            text: "연준의 완화 신호와 유럽중앙은행의 점진적 스탠스 전환 기대가 위험자산 회복을 지지했습니다.",
            ai: "실질금리 하락 기대가 유지될 경우 성장주와 신흥국 자산에 우호적인 환경이 이어질 수 있습니다."
          },
          {
            title: "에너지 가격 안정",
            text: "국제 유가가 하향 안정되며 인플레이션 재가속 우려가 완화되는 모습입니다.",
            ai: "에너지 가격 안정은 소비 심리와 기업 마진에 긍정적이나, 중동 리스크는 계속 확인해야 합니다."
          }
        ],
        korea: [
          {
            title: "원/달러 환율 안정",
            text: "원/달러 환율이 1,380원대에서 안정 흐름을 보이며 수입 물가 부담이 일부 완화되었습니다.",
            ai: "환율 안정이 이어지면 외국인 수급과 국내 물가 전망에 긍정적으로 작용할 수 있습니다."
          },
          {
            title: "수출주 모멘텀 점검",
            text: "반도체와 자동차 중심의 수출 회복세가 이어지는지 확인할 필요가 있습니다.",
            ai: "중국 제조업 지표 둔화가 한국 수출주에 단기 부담이 될 수 있어 업종별 차별화가 중요합니다."
          }
        ],
        impacts: [
          ["금리", "완화 기대가 유지되면 장기금리 하락 압력이 커질 수 있습니다."],
          ["환율", "달러 강세가 둔화되면 원화와 신흥국 통화에 우호적입니다."],
          ["주식", "성장주와 수출주가 수급 개선의 중심이 될 가능성이 있습니다."]
        ]
      },
      {
        date: "2026-05-03",
        global: [
          {
            title: "미국 소비자물가지수(CPI) 발표",
            text: "예상치를 하회하는 결과로 금리 인하 기대감이 확산되었습니다.",
            ai: "인플레이션 둔화 추세가 고착화될 경우 연내 금리 인하 가능성이 높아질 수 있습니다."
          },
          {
            title: "중국 경기 부양책 효과",
            text: "상해 증시 반등 및 소비 지표 개선 조짐이 확인되었습니다.",
            ai: "내수 회복 강도가 관건이며, 원자재 가격 상승 압력으로 이어질 수 있습니다."
          }
        ],
        korea: [
          {
            title: "반도체 수출 호조 지속",
            text: "메모리 반도체 단가 상승 및 AI 서버 수요 증가가 이어지고 있습니다.",
            ai: "하반기 경상수지 흑자 폭 확대의 핵심 동력으로 작용할 전망입니다."
          },
          {
            title: "가계부채 및 부동산 대출 추이",
            text: "스트레스 DSR 도입 영향과 금리 변화의 조합을 살펴봐야 합니다.",
            ai: "금리 인하 시점과 맞물려 가계 부채 관리 역량이 금융 안정의 핵심입니다."
          }
        ],
        impacts: [
          ["물가", "CPI 둔화는 통화정책 전환 기대를 높입니다."],
          ["수출", "반도체 회복은 한국 경기의 핵심 변수입니다."],
          ["부동산", "대출 규제와 금리 경로가 거래 심리를 좌우합니다."]
        ]
      }
    ];

    const selector = document.getElementById("dailyPageSelector");
    const selectedDateLabel = document.getElementById("selectedDateLabel");
    const globalIssues = document.getElementById("globalIssues");
    const koreaIssues = document.getElementById("koreaIssues");
    const impactList = document.getElementById("impactList");
    const modeToggle = document.getElementById("modeToggle");

    function createIssueCard(item) {
      return `
        <div class="data-card">
          <h4>${item.title}</h4>
          <p>${item.text}</p>
          <div class="ai-analysis"><strong>AI 분석:</strong> ${item.ai}</div>
        </div>
      `;
    }

    function renderDailyIssue(index) {
      const issue = dailyIssues[index];
      selectedDateLabel.textContent = `${issue.date} 브리핑`;
      globalIssues.innerHTML = issue.global.map(createIssueCard).join("");
      koreaIssues.innerHTML = issue.korea.map(createIssueCard).join("");
      impactList.innerHTML = issue.impacts.map(([title, text]) => `
        <div class="impact-item">
          <strong>${title}</strong>
          <span>${text}</span>
        </div>
      `).join("");
    }

    dailyIssues.forEach((issue, index) => {
      const option = document.createElement("option");
      option.value = index;
      option.textContent = issue.date;
      selector.appendChild(option);
    });

    selector.addEventListener("change", (event) => {
      renderDailyIssue(Number(event.target.value));
    });

    function initDarkMode() {
      const isDark = localStorage.getItem("darkMode") === "true" ||
                     (!localStorage.getItem("darkMode") && window.matchMedia("(prefers-color-scheme: dark)").matches);
      if (isDark) {
        document.body.classList.add("dark-mode");
        modeToggle.textContent = "☾";
      }
    }

    modeToggle.addEventListener("click", () => {
      const isDark = document.body.classList.toggle("dark-mode");
      localStorage.setItem("darkMode", isDark);
      modeToggle.textContent = isDark ? "☾" : "☀";
    });

    initDarkMode();
    renderDailyIssue(0);
  </script>
</body>
</html>
