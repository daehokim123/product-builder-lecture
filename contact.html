  <main class="container">
    <header class="page-intro">
      <p class="eyebrow">Contact</p>
      <h1>문의</h1>
      <p>콘텐츠 제휴, 오류 제보, 비즈니스 문의를 남겨 주세요. 확인 후 영업일 기준 5일 이내 답변을 목표로 합니다.</p>
    </header>

    <form id="contactForm" class="contact-form" action="https://formspree.io/f/xnjwjlny" method="POST">
      <div class="form-group">
        <label for="name">성함/업체명</label>
        <input type="text" id="name" name="name" placeholder="예: 홍길동" required>
      </div>
      <div class="form-group">
        <label for="email">이메일 주소</label>
        <input type="email" id="email" name="email" placeholder="example@email.com" required>
      </div>
      <div class="form-group">
        <label for="message">문의 내용</label>
        <textarea id="message" name="message" rows="6" placeholder="문의하실 내용을 입력해 주세요." required></textarea>
      </div>
      <button type="submit" class="submit-btn">문의 보내기</button>
    </form>

    <div class="source-box">
      <strong>개인정보 안내:</strong> 문의 양식으로 전달된 이름, 이메일, 문의 내용은 답변 목적에만 사용됩니다. 자세한 내용은 개인정보처리방침을 확인해 주세요.
