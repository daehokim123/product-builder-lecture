  <script>
    const learningMaterials = [
      {
        id: 10,
        icon: "⑩",
        date: "2026-04-15",
        title: "자산 가격의 허상과 화폐 가치의 실체",
        category: "지식한방 칼럼",
        content: `
          <p>부동산 가격이 10년 만에 두 배가 되었다면, 그것은 부동산의 가치가 두 배로 올랐기 때문일까요? 아니면 화폐의 가치가 절반으로 떨어졌기 때문일까요? 이 질문은 단순해 보이지만, 자산 투자와 재테크의 본질을 관통하는 핵심입니다.</p>

          <h3>화폐 가치 하락의 구조적 원인</h3>
          <p>우리가 사용하는 법정화폐(fiat currency)는 금본위제가 폐지된 1971년 이후 실물 자산과의 연계가 끊어졌습니다. 닉슨 대통령의 금-달러 태환 정지 선언 이후, 각국 중앙은행은 경제 상황에 따라 통화량을 자유롭게 조절할 수 있게 되었습니다. 경기 침체가 오면 금리를 낮추고 돈을 푸는 방식으로 대응하는 것이 현대 통화 정책의 기본 틀입니다.</p>
          <p>문제는 이 과정에서 화폐의 구매력이 지속적으로 하락한다는 것입니다. 한국은행 통계에 따르면 1990년 이후 한국의 물가 수준은 약 3~4배 상승했습니다. 이는 1990년에 100만 원이었던 물건이 지금은 300만 원에서 400만 원을 호가한다는 의미이며, 반대로 말하면 현재의 100만 원은 1990년대 기준으로 25만 원에서 33만 원에 불과한 구매력을 갖는다는 뜻입니다.</p>

          <h3>자산 가격 상승의 두 가지 해석</h3>
          <p>서울 아파트 가격이 1990년대 초 대비 현재 10배 이상 오른 것은 사실입니다. 하지만 이 상승분을 분해해 보면 흥미로운 사실을 발견할 수 있습니다. 물가 상승분(화폐 가치 하락)을 제거한 실질 가격 상승률은 명목 상승률보다 훨씬 낮습니다. 즉, 자산 가격의 명목 상승 중 상당 부분은 실제 자산 가치의 증가가 아니라 화폐 가치의 하락을 반영한 것입니다.</p>
          <p>이를 이해하기 위해 금(Gold)을 예로 들 수 있습니다. 금의 실물 가치 자체는 수천 년 동안 큰 변화가 없습니다. 금 1온스로 살 수 있는 고급 양복의 양은 고대 로마 시대나 지금이나 비슷하다는 연구들이 있습니다. 그럼에도 금의 달러 표시 가격은 1971년 온스당 35달러에서 현재 2,300달러 이상으로 올랐습니다. 이는 금의 가치가 오른 것이 아니라 달러의 가치가 그만큼 하락했음을 보여주는 강력한 증거입니다.</p>

          <div class="key-point">
            <strong>💡 핵심 인사이트</strong>
            자산 가격의 명목 상승에 속지 마세요. 진짜 부는 인플레이션을 초과하는 실질 수익률에서 만들어집니다. 화폐 가치 하락을 고려한 실질 수익률 계산이 건전한 투자의 출발점입니다.
          </div>

          <h3>인플레이션 시대, 자산 배분 전략</h3>
          <p>화폐 가치 하락이 구조적으로 지속될 수밖에 없다면, 개인 투자자는 어떻게 대응해야 할까요? 핵심은 '화폐 보유'에서 '실물 자산 보유'로 사고의 전환을 이루는 것입니다. 현금으로 100만 원을 10년 보유하면 구매력은 줄어들지만, 같은 금액을 생산적인 실물 자산에 투자하면 최소한 화폐 가치 하락을 방어하거나 초과 수익을 낼 수 있습니다.</p>
          <p>역사적으로 인플레이션 헤지(방어) 수단으로 검증된 자산에는 부동산, 금, 원자재, 인플레이션 연동 채권(TIPS), 그리고 강력한 가격 결정력을 가진 기업의 주식 등이 있습니다. 물론 각 자산은 고유한 위험과 특성을 가지므로, 자신의 투자 목적과 위험 감수 능력에 맞는 분산 투자가 필요합니다.</p>

          <h3>결론: 화폐 가치의 눈으로 세상을 보라</h3>
          <p>부자들은 예외 없이 화폐(현금)를 단기 보유 수단으로만 사용하고, 장기적으로는 자산으로 부를 보관합니다. "부동산 부자가 되는 법"의 핵심은 사실 "오를 것 같은 부동산을 고르는 눈"보다 "화폐 가치가 하락하기 전에 실물 자산을 확보하는 행동력"에 가깝습니다. 자산 가격의 허상을 꿰뚫어 보고, 화폐 가치 하락이라는 기울어진 운동장에서 어떻게 플레이할지 전략을 세우는 것이 장기 투자의 핵심입니다.</p>
        `
      },
      {
        id: 7,
        icon: "⑦",
        date: "2026-03-25",
        title: "위기 속의 기회를 잡는 유동성의 본질",
        category: "지식한방 칼럼",
        content: `
          <p>2008년 금융위기, 2020년 코로나 팬데믹 쇼크, 2022년 레고랜드 사태. 이 모든 위기의 공통점은 무엇일까요? 바로 유동성(Liquidity)의 급격한 고갈입니다. 시장에서 돈이 마르면 멀쩡한 자산도 헐값에 팔려나가고, 탄탄한 기업도 도산 위기에 몰립니다. 반대로, 이런 순간에 현금을 쥐고 있던 투자자들은 역사적으로 최고의 수익을 올렸습니다.</p>

          <h3>유동성이란 무엇인가?</h3>
          <p>유동성은 자산을 빠르게, 그리고 가격 손실 없이 현금으로 전환할 수 있는 능력을 말합니다. 넓은 의미에서는 경제 시스템 내에서 돈이 얼마나 자유롭게 흐르는지를 나타내는 개념이기도 합니다. 중앙은행이 기준금리를 내리거나 채권을 매입(양적완화)하면 시중에 돈이 많아지고, 반대로 금리를 올리거나 보유 자산을 매각(양적긴축)하면 유동성이 줄어듭니다.</p>
          <p>유동성이 풍부하면 투자자들은 더 많은 위험을 감수하고, 자산 가격은 전반적으로 상승합니다. 반대로 유동성이 고갈되면 투자자들은 안전 자산으로 도피하고, 위험 자산(주식, 부동산, 암호화폐 등)은 급락합니다. 이것이 금리와 자산 가격이 역방향으로 움직이는 기본 메커니즘입니다.</p>

          <h3>유동성 위기의 전형적인 패턴</h3>
          <p>역사적인 유동성 위기는 대체로 비슷한 패턴을 따릅니다. 첫째로 자산 가격이 장기간 과도하게 상승하면서 레버리지(부채를 이용한 투자)가 누적됩니다. 둘째로 어떤 계기(금리 인상, 외부 충격, 신뢰 붕괴 등)로 인해 자산 가격이 하락하기 시작합니다. 셋째로 레버리지 투자자들이 손실을 줄이기 위해 보유 자산을 매각하고, 이것이 추가 가격 하락을 유발하는 악순환이 시작됩니다. 마지막으로 신용 시장이 얼어붙고, 기업들의 자금 조달이 어려워지면서 실물 경제까지 타격을 받습니다.</p>

          <div class="key-point">
            <strong>💡 워런 버핏의 유동성 전략</strong>
            워런 버핏이 경기가 좋을 때 대규모 현금을 비축하는 이유가 여기에 있습니다. 그는 "공포가 극에 달할 때 탐욕스러워야 한다"고 말했습니다. 2008년 금융위기 당시 버크셔 해서웨이는 골드만삭스, GE 등에 파격적인 조건으로 자금을 지원하며 엄청난 수익을 올렸습니다.
          </div>

          <h3>유동성 사이클을 읽는 방법</h3>
          <p>유동성 사이클을 파악하는 주요 지표로는 중앙은행 기준금리 동향, M2 통화 공급량 변화, 신용 스프레드(국채 대비 회사채 금리 차이), VIX 공포 지수, 그리고 레포(Repo) 시장 금리 등이 있습니다. 신용 스프레드가 급격히 확대되거나 단기 자금 시장(레포 시장)에서 금리가 치솟는 것은 유동성 위기의 강력한 조기 경보 신호입니다.</p>
          <p>한국 시장에서는 특히 외국인 투자 자금의 흐름이 중요합니다. 글로벌 유동성이 축소되면 신흥국 시장에서 외국인 자금이 빠져나가면서 환율이 오르고 주식시장이 하락하는 패턴이 반복됩니다. 이를 '달러 강세-신흥국 위기' 사이클이라고 부릅니다.</p>

          <h3>위기를 기회로 바꾸는 실천 전략</h3>
          <p>유동성 위기를 투자 기회로 활용하려면 평소에 충분한 현금 비율을 유지하는 것이 중요합니다. 금융 시장의 역사는 반복적으로 과매도(oversold) 구간이 찾아온다는 것을 보여줍니다. 위기 때는 우량 기업의 주식도 내재 가치 대비 크게 할인된 가격에 거래되는 경우가 많습니다. 단, 위기 상황에서 언제가 바닥인지 정확히 예측하기는 어렵기 때문에, 단번에 모든 자금을 투입하기보다는 분할 매수 전략이 효과적입니다.</p>
          <p>유동성의 본질을 이해하는 투자자는 시장의 공황 심리에 흔들리지 않고, 오히려 군중이 공포에 떠는 순간을 준비된 기회로 활용할 수 있습니다. 이것이 부자들이 위기를 더 부자가 되는 계기로 삼는 근본적인 이유입니다.</p>
        `
      },
      {
        id: "ai",
        icon: "🚀",
        date: "2026-01-24",
        title: "1월 4주차: AI 시대, '증강 인간'만이 살아남는다",
        category: "지식한방 정규 칼럼",

          <p>GDP(국내총생산)는 국가 내에서 생산된 모든 재화와 서비스의 시장 가치를 합산합니다. 그런데 GDP는 분배를 반영하지 않습니다. 상위 1%의 자산이 폭발적으로 증가해도 GDP는 늘어납니다. 또한 GDP는 '행복'이나 '삶의 질'을 측정하지 않습니다. 교통 사고가 늘어나면 의료비와 자동차 수리비 지출이 늘어 GDP는 오히려 증가합니다. 환경 파괴, 건강 악화, 가족 해체로 인한 '돌봄 노동'의 시장화도 GDP를 높입니다.</p>

          <div class="key-point">
            <strong>💡 대안적 지표들</strong>
            GDP의 한계를 보완하기 위해 다양한 대안 지표들이 개발되었습니다. 인간개발지수(HDI), 행복지수(Happy Planet Index), 지니계수(소득 불평등 측정), 중위 가계소득 등이 있습니다. 경제 통계를 읽을 때 하나의 숫자에만 의존하지 말고 여러 지표를 종합적으로 고려하는 것이 중요합니다.
          </div>

          <h3>소비자물가지수(CPI)의 맹점</h3>
          <p>정부가 발표하는 물가 상승률은 왜 우리 체감과 다를까요? 소비자물가지수(CPI)는 대표적인 소비 품목들로 구성된 바스켓의 가격 변화를 측정합니다. 그런데 이 바스켓에는 우리가 자주 구매하는 식료품이나 집세보다 상대적으로 가격이 안정된 전자제품 등의 비중도 포함되어 있습니다. 또한 주거비의 경우 전·월세 가격보다 낮게 측정되는 경향이 있어, 실제 주거비 부담을 크게 느끼는 사람들에게 공식 물가 지표가 체감 현실과 동떨어지게 느껴집니다.</p>

          <h3>통계를 현명하게 읽는 방법</h3>
          <p>경제 통계를 현명하게 활용하려면 몇 가지 원칙을 기억해야 합니다. 첫째, 누가, 왜 이 통계를 만들었는지 물어보세요. 생산자의 의도에 따라 통계는 얼마든지 편향될 수 있습니다. 둘째, 평균보다 분포를 보세요. 평균이 높아도 중간 계층이 줄어들고 있다면 체감 경제는 악화될 수 있습니다. 셋째, 통계가 측정하지 못하는 것이 무엇인지 생각하세요. 숫자 너머에 있는 현실이 항상 존재합니다. 통계를 맹신하지도, 완전히 불신하지도 말고, 비판적으로 읽는 시각을 길러야 합니다.</p>
        `
      },
      {
        id: 8,
        icon: "⑧",
        date: "2026-03-30",
        title: "자산을 지키는 리스크 관리 원칙",
        category: "지식한방 칼럼",
        content: `
          <p>투자의 목표는 단순히 수익을 극대화하는 것이 아닙니다. 장기적으로 자산을 불리기 위해서는 먼저 자산을 지키는 것이 선행되어야 합니다. 워런 버핏이 투자의 제1 원칙으로 "절대 돈을 잃지 마라", 제2 원칙으로 "제1 원칙을 절대 잊지 마라"를 꼽은 이유가 여기에 있습니다. 리스크 관리는 방어적 태도가 아니라 장기 복리 성장의 핵심 전제조건입니다.</p>

          <h3>리스크의 두 가지 본질</h3>
          <p>투자 세계에서 리스크는 크게 '변동성 리스크'와 '영구적 자본 손실 리스크' 두 가지로 나뉩니다. 변동성 리스크는 자산 가격이 오르내리는 것을 말합니다. 우량 기업의 주식이 경기 침체로 40% 하락했더라도, 기업의 펀더멘탈이 건재하다면 이것은 시간이 지나면 회복될 '일시적 손실'입니다. 반면 영구적 자본 손실은 부도난 기업의 주식이나 채권처럼 원금 자체가 사라지는 것입니다. 현명한 투자자는 전자(변동성)는 감내하고, 후자(영구 손실)를 피하는 것을 목표로 합니다.</p>

          <h3>분산 투자: 리스크 관리의 기본</h3>
          <p>노벨 경제학상을 받은 해리 마코위츠의 현대 포트폴리오 이론(MPT)은 "모든 달걀을 한 바구니에 담지 말라"는 분산 투자의 원리를 수학적으로 증명했습니다. 상관관계가 낮은 자산들을 조합하면 개별 자산의 위험을 포트폴리오 수준에서 줄일 수 있습니다. 국내 주식, 해외 주식, 채권, 부동산, 금 등 다양한 자산 클래스에 분산하면, 특정 자산이 급락해도 전체 포트폴리오의 손실을 제한할 수 있습니다.</p>

          <div class="key-point">
            <strong>💡 손절의 철학: 손실을 키우지 않는 원칙</strong>
            많은 개인 투자자들이 손실 난 투자를 "언젠가 오르겠지"라는 기대로 계속 보유합니다. 그러나 -50% 손실을 회복하려면 +100% 수익이 필요합니다. 손절(stop-loss)은 나쁜 투자를 인정하고, 남은 자본을 더 나은 기회에 재배치하는 합리적 판단입니다. 손절은 패배가 아니라 자본을 지키는 행동입니다.
          </div>

          <h3>레버리지 리스크: 양날의 검</h3>
          <p>빚을 이용한 투자(레버리지)는 수익을 극대화하는 동시에 손실도 극대화합니다. 100% 자기 자본으로 50% 하락한 자산은 원금의 절반이 남지만, 2배 레버리지로 투자했다면 원금이 전부 날아갑니다. 부동산 투자에서도 과도한 레버리지는 금리 상승기에 치명적입니다. 레버리지를 사용할 때는 최악의 시나리오에서도 원금이 유지될 수 있는 수준을 유지해야 합니다.</p>

          <h3>심리적 리스크: 가장 위험한 적은 자기 자신</h3>
          <p>행동경제학의 연구들은 인간이 합리적 경제인이 아님을 반복해서 증명합니다. 손실 회피 편향(loss aversion: 동일한 크기의 손실이 이익보다 2배 이상 크게 느껴짐), 군중 심리(모두가 사면 나도 사고 싶고, 모두가 팔면 나도 팔고 싶음), 확증 편향(내 의견을 지지하는 정보만 수용함) 등이 투자 손실의 주요 원인입니다. 투자 원칙을 문서로 작성하고, 시장 변동에 흔들릴 때마다 그 원칙으로 돌아가는 훈련이 장기 투자 성공의 핵심입니다.</p>
        `
      }
    ];

    learningMaterials.sort((a, b) => new Date(b.date) - new Date(a.date));

    const listView = document.getElementById("listView");
    const contentViewer = document.getElementById("contentViewer");
    const curriculumList = document.getElementById("curriculumList");
    const articleTitle = document.getElementById("articleTitle");
    const articleMeta = document.getElementById("articleMeta");
    const articleBody = document.getElementById("articleBody");

    function renderList() {
      curriculumList.innerHTML = "";
      learningMaterials.forEach((item, index) => {
        const div = document.createElement("div");
        div.className = "curriculum-item";
        div.innerHTML = `
          <div class="item-icon">${item.icon}</div>
          <div class="item-info">
            <h3>${item.title}</h3>
            <p>${item.date} | ${item.category}</p>
          </div>
        `;
        div.onclick = () => showArticle(index);
        curriculumList.appendChild(div);
      });
    }

    function showArticle(index) {
      const item = learningMaterials[index];
      articleTitle.textContent = item.title;
      articleMeta.textContent = `분류: ${item.category} | 발행일: ${item.date}`;
      articleBody.innerHTML = item.content;
      listView.style.display = "none";
      contentViewer.style.display = "block";
      window.scrollTo(0, 0);
    }

    function showList() {
      listView.style.display = "block";
      contentViewer.style.display = "none";
    }

    renderList();

    const modeToggle = document.getElementById("modeToggle");
    function initDarkMode() {
      const isDark = localStorage.getItem("darkMode") === "true" ||
                     (!localStorage.getItem("darkMode") && window.matchMedia("(prefers-color-scheme: dark)").matches);
      if (isDark) { document.body.classList.add("dark-mode"); modeToggle.textContent = "☾"; }
    }
    modeToggle.addEventListener("click", () => {
      const isDark = document.body.classList.toggle("dark-mode");
      localStorage.setItem("darkMode", isDark);
      modeToggle.textContent = isDark ? "☾" : "☀";
    });
    initDarkMode();
  </script>
</body>
</html>
