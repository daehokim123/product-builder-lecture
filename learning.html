<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>경제 학습 자료실 - Global Economy Analytics Hub</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* 리스트 스타일 */
    .curriculum-list {
      display: grid;
      gap: 16px;
      margin-top: 24px;
    }
    .curriculum-item {
      padding: 20px;
      background: var(--set-bg);
      border: 1px solid var(--set-border);
      border-radius: 16px;
      display: flex;
      align-items: center;
      gap: 16px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .curriculum-item:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 20px rgba(0,0,0,0.1);
      border-color: var(--accent-color);
    }
    .item-icon {
      font-size: 24px;
      background: var(--ai-bg);
      width: 50px;
      height: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 12px;
    }
    .item-info h3 {
      font-size: 16px;
      margin: 0 0 4px;
      color: var(--text-header);
    }
    .item-info p {
      font-size: 13px;
      color: var(--text-secondary);
      margin: 0;
    }

    /* 본문 뷰어 스타일 */
    #contentViewer {
      display: none; /* 초기에는 숨김 */
      animation: fadeIn 0.3s ease;
    }
    .content-article {
      background: var(--container-bg);
      padding: 40px;
      border-radius: 24px;
      border: 1px solid var(--container-border);
      line-height: 1.8;
    }
    .article-header {
      margin-bottom: 32px;
      padding-bottom: 24px;
      border-bottom: 2px solid var(--accent-color);
    }
    .article-header h2 {
      font-size: 28px;
      color: var(--text-header);
      margin-bottom: 8px;
    }
    .article-meta {
      color: var(--text-secondary);
      font-size: 14px;
    }
    .article-body {
      font-size: 16px;
      color: var(--text-primary);
    }
    .article-body p { margin-bottom: 20px; }
    .article-body h3 { margin: 32px 0 16px; color: var(--accent-color); }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 24px;
      color: var(--accent-color);
      text-decoration: none;
      font-weight: bold;
      cursor: pointer;
      background: none;
      border: none;
      padding: 0;
      font-size: 16px;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<body>
  <nav class="navbar">
    <div class="nav-container">
      <a href="index.html" class="nav-logo">GEA Hub</a>
      <ul class="nav-links">
        <li><a href="index.html#daily-issue">오늘의이슈</a></li>
        <li><a href="index.html#expert">전문가분석</a></li>
        <li><a href="index.html#data">실시간데이터</a></li>
        <li><a href="index.html#weekly">주간요약</a></li>
      </ul>
      <button id="modeToggle" class="mode-toggle" aria-label="다크 모드 토글">☀️</button>
    </div>
  </nav>

  <main class="container">
    <!-- 목록 뷰 -->
    <div id="listView">
      <a href="index.html" class="back-btn">← 메인으로 돌아가기</a>
      <header class="hub-header">
        <h1>📚 경제 학습 자료실</h1>
        <p>박종훈 소장의 지식한방 칼럼을 통해 거시경제의 흐름을 학습하세요.</p>
      </header>
      <div id="curriculumList" class="curriculum-list">
        <!-- JS에서 동적으로 생성 -->
      </div>
    </div>

    <!-- 상세 본문 뷰 -->
    <div id="contentViewer">
      <button onclick="showList()" class="back-btn">← 목록으로 돌아가기</button>
      <article class="content-article">
        <header class="article-header">
          <h2 id="articleTitle">제목</h2>
          <div class="article-meta" id="articleMeta">분류: 지식한방 칼럼</div>
        </header>
        <div class="article-body" id="articleBody">
          <!-- 내용이 여기에 들어감 -->
        </div>
      </article>
    </div>

    <footer class="footer">
      <p>&copy; 2026 Global Economy Analytics Hub. Created by KDH</p>
    </footer>
  </main>

  <script>
    // --- 학습 자료 데이터 (날짜순 정렬을 위해 date 필드 추가) ---
    const learningMaterials = [
      {
        id: 10,
        icon: "⑩",
        date: "2026-04-15",
        title: "자산 가격의 허상과 화폐 가치의 실체",
        category: "지식한방 칼럼",
        content: `<h3>화폐 가치 하락의 시대</h3><p>우리가 사용하는 돈의 가치는 시간이 갈수록 떨어집니다. 자산 가격이 오르는 것처럼 보이는 것은 사실 자산의 가치가 올라간 것이 아니라, 화폐의 가치가 그만큼 하락했기 때문일 수도 있습니다.</p>`
      },
      {
        id: 7,
        icon: "⑦",
        date: "2026-03-25",
        title: "위기 속의 기회를 잡는 유동성의 본질",
        category: "지식한방 칼럼",
        content: `<h3>유동성이란 무엇인가?</h3><p>시장에 돈이 얼마나 잘 도는지를 나타내는 유동성은 경제의 피와 같습니다. 위기 상황에서 유동성이 마를 때 기회가 찾아옵니다.</p>`
      },
      {
        id: "ai",
        icon: "🚀",
        date: "2026-01-24",
        title: "1월 4주차: AI 시대, ‘증강 인간’만이 살아남는다",
        category: "지식한방 정규 칼럼",
        content: `<h3>AI는 위협인가 기회인가?</h3><p>인공지능 기술의 발전은 단순 노동뿐만 아니라 전문직의 영역까지 파고들고 있습니다. 이제 우리는 AI를 도구로 활용하는 '증강 인간'이 되어야 합니다.</p>`
      },
      {
        id: 3,
        icon: "③",
        date: "2026-01-15",
        title: "인구 구조의 변화가 가져올 경제적 충격",
        category: "지식한방 칼럼",
        content: `<h3>인구 감소와 경제 성장</h3><p>저출산 고령화 문제는 국가 경제의 존립을 위협하는 경제 문제입니다. 노동 인구의 감소가 잠재 성장률에 미치는 영향을 분석합니다.</p>`
      },
      {
        id: 2,
        icon: "②",
        date: "2026-01-10",
        title: "돈을 찍어낼수록 당신은 가난해진다",
        category: "지식한방 칼럼",
        content: `<p>무분별한 양적 완화와 화폐 발행이 개인의 구매력을 어떻게 갉아먹는지 다룹니다.</p>`
      },
      {
        id: 1,
        icon: "①",
        date: "2026-01-05",
        title: "계속되는 환율 상승의 구조적인 원인",
        category: "지식한방 칼럼",
        content: `<p>한국 경제의 펀더멘탈과 글로벌 달러 패권 사이에서 발생하는 환율 상승의 본질적 이유를 설명합니다.</p>`
      },
      {
        id: "oil",
        icon: "🛢️",
        date: "2026-03-14",
        title: "3월 2주차: 유가를 둘러싼 진실과 오해",
        category: "지식한방 정규 칼럼",
        content: `<p>에너지 가격 결정의 정치적 메커니즘과 산유국들의 전략적 움직임을 분석합니다.</p>`
      },
      {
        id: "iran",
        icon: "🇮🇷",
        date: "2026-03-07",
        title: "3월 1주차: 미국의 이란 공습과 경제적 파장",
        category: "지식한방 정규 칼럼",
        content: `<p>지정학적 리스크가 공급망과 유가, 그리고 금융 시장 전반에 미치는 영향을 진단합니다.</p>`
      },
      {
        id: "gold",
        icon: "💰",
        date: "2026-02-28",
        title: "2월 4주차: 금값까지 흔들린 이유와 4월 이후의 시장",
        category: "지식한방 정규 칼럼",
        content: `<p>안전자산인 금의 가격이 변동하는 핵심 요인을 금리와 달러 가치의 측면에서 분석합니다.</p>`
      },
      {
        id: "kospi",
        icon: "📈",
        date: "2026-02-21",
        title: "2월 4주차 ②: 코스피 6,000 돌파의 숨겨진 비밀",
        category: "지식한방 정규 칼럼",
        content: `<p>한국 증시의 저평가 요인 해소와 밸류업 프로그램의 미래 전망을 다룹니다.</p>`
      },
      {
        id: "silver",
        icon: "🥈",
        date: "2026-01-31",
        title: "1월 5주차: 은(Silver). 새로운 에너지 표준의 핵심",
        category: "지식한방 정규 칼럼",
        content: `<p>친환경 에너지 시대로의 전환에서 은이 가지는 산업적 가치와 투자 자산으로서의 매력을 분석합니다.</p>`
      },
      {
        id: "gold_drop",
        icon: "📉",
        date: "2026-02-14",
        title: "2월 2주차: 금값 10% 폭락, 끝이 아닌 '숨 고르기'인 이유",
        category: "지식한방 정규 칼럼",
        content: `<p>자산 가격 조정 국면에서 흔들리지 않는 투자 원칙을 제시합니다.</p>`
      },
      {
        id: 9,
        icon: "⑨",
        date: "2026-04-05",
        title: "상대적 박탈감을 만드는 통계의 함정",
        category: "지식한방 칼럼",
        content: `<p>평균의 오류와 통계 수치가 숨기고 있는 경제의 이면을 날카롭게 지적합니다.</p>`
      },
      {
        id: 8,
        icon: "⑧",
        date: "2026-03-30",
        title: "자산을 지키는 리스크 관리 원칙",
        category: "지식한방 칼럼",
        content: `<p>최악의 상황에서도 살아남는 리스크 관리 시스템 구축의 중요성을 학습합니다.</p>`
      }
    ];

    // 날짜 기준 내림차순 정렬 (최신순)
    learningMaterials.sort((a, b) => new Date(b.date) - new Date(a.date));

    const listView = document.getElementById("listView");
    const contentViewer = document.getElementById("contentViewer");
    const curriculumList = document.getElementById("curriculumList");
    const articleTitle = document.getElementById("articleTitle");
    const articleMeta = document.getElementById("articleMeta");
    const articleBody = document.getElementById("articleBody");

    // 리스트 렌더링
    function renderList() {
      curriculumList.innerHTML = "";
      learningMaterials.forEach((item, index) => {
        const div = document.createElement("div");
        div.className = "curriculum-item";
        div.innerHTML = `
          <div class="item-icon">${item.icon}</div>
          <div class="item-info">
            <h3>${item.title}</h3>
            <p>${item.date} | ${item.category}</p>
          </div>
        `;
        div.onclick = () => showArticle(index);
        curriculumList.appendChild(div);
      });
    }

    // 본문 보기
    function showArticle(index) {
      const item = learningMaterials[index];
      articleTitle.textContent = item.title;
      articleMeta.textContent = `분류: ${item.category} | 번호: ${item.id}`;
      articleBody.innerHTML = item.content;

      listView.style.display = "none";
      contentViewer.style.display = "block";
      window.scrollTo(0, 0);
    }

    // 목록으로 돌아가기
    function showList() {
      listView.style.display = "block";
      contentViewer.style.display = "none";
    }

    // 초기화
    renderList();

    // 다크모드 동기화 (script.js의 기능을 빌림)
    const modeToggle = document.getElementById("modeToggle");
    function initDarkMode() {
      const isDark = localStorage.getItem("darkMode") === "true" || 
                     (!localStorage.getItem("darkMode") && window.matchMedia("(prefers-color-scheme: dark)").matches);
      if (isDark) { document.body.classList.add("dark-mode"); modeToggle.textContent = "🌙"; }
    }
    modeToggle.addEventListener("click", () => {
      const isDark = document.body.classList.toggle("dark-mode");
      localStorage.setItem("darkMode", isDark);
      modeToggle.textContent = isDark ? "🌙" : "☀️";
    });
    initDarkMode();
  </script>
</body>
</html>
