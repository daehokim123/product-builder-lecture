<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>경제 학습 자료실 - Global Economy Analytics Hub</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* 리스트 스타일 */
    .section-title {
      font-size: 20px;
      margin: 40px 0 20px;
      color: var(--text-header);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .section-title::before {
      content: "";
      width: 4px;
      height: 20px;
      background: var(--accent-color);
      border-radius: 2px;
    }
    .curriculum-list {
      display: grid;
      gap: 12px;
    }
    .curriculum-item {
      padding: 18px;
      background: var(--set-bg);
      border: 1px solid var(--set-border);
      border-radius: 14px;
      display: flex;
      align-items: center;
      gap: 16px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .curriculum-item:hover {
      transform: translateX(5px);
      background: var(--ai-bg);
      border-color: var(--accent-color);
    }
    .item-number {
      font-size: 16px;
      font-weight: 800;
      color: var(--accent-color);
      width: 32px;
      height: 32px;
      background: rgba(37, 99, 235, 0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .item-info h3 {
      font-size: 15px;
      margin: 0 0 2px;
      color: var(--text-header);
    }
    .item-info p {
      font-size: 12px;
      color: var(--text-secondary);
      margin: 0;
    }

    /* 본문 뷰어 스타일 */
    #contentViewer {
      display: none;
      animation: fadeIn 0.3s ease;
    }
    .content-article {
      background: var(--container-bg);
      padding: 40px;
      border-radius: 24px;
      border: 1px solid var(--container-border);
      line-height: 1.8;
    }
    .article-header {
      margin-bottom: 32px;
      padding-bottom: 24px;
      border-bottom: 2px solid var(--accent-color);
    }
    .article-header h2 {
      font-size: 26px;
      color: var(--text-header);
      margin-bottom: 8px;
    }
    .article-meta {
      color: var(--text-secondary);
      font-size: 14px;
    }
    .article-body {
      font-size: 16px;
      color: var(--text-primary);
    }
    .article-body p { margin-bottom: 20px; }
    .article-body h3 { margin: 32px 0 16px; color: var(--accent-color); border-left: 4px solid var(--accent-color); padding-left: 12px; }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 24px;
      color: var(--accent-color);
      text-decoration: none;
      font-weight: bold;
      cursor: pointer;
      background: none;
      border: none;
      padding: 0;
      font-size: 15px;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 640px) {
      .content-article { padding: 24px; }
      .article-header h2 { font-size: 20px; }
    }
  </style>
</head>

<body>
  <nav class="navbar">
    <div class="nav-container">
      <a href="index.html" class="nav-logo">GEA Hub</a>
      <ul class="nav-links">
        <li><a href="index.html#daily-issue">오늘의이슈</a></li>
        <li><a href="index.html#expert">전문가분석</a></li>
        <li><a href="index.html#data">실시간데이터</a></li>
        <li><a href="index.html#weekly">주간요약</a></li>
      </ul>
      <button id="modeToggle" class="mode-toggle" aria-label="다크 모드 토글">☀️</button>
    </div>
  </nav>

  <main class="container">
    <!-- 목록 뷰 -->
    <div id="listView">
      <a href="index.html" class="back-btn">← 메인으로 돌아가기</a>
      <header class="hub-header">
        <h1>📚 경제 학습 자료실</h1>
        <p>분야별 전문가의 통찰력을 통해 거시경제와 금융 시장의 흐름을 학습하세요.</p>
      </header>
      
      <h2 class="section-title">전문가 정기 칼럼</h2>
      <div id="columnList" class="curriculum-list"></div>

      <h2 class="section-title">정규 강의 정리본</h2>
      <div id="lectureList" class="curriculum-list"></div>
    </div>

    <!-- 상세 본문 뷰 -->
    <div id="contentViewer">
      <button onclick="showList()" class="back-btn">← 목록으로 돌아가기</button>
      <article class="content-article">
        <header class="article-header">
          <h2 id="articleTitle">제목</h2>
          <div class="article-meta" id="articleMeta">분류: 학습 자료</div>
        </header>
        <div class="article-body" id="articleBody"></div>
      </article>
    </div>

    <footer class="footer">
      <p>&copy; 2026 Global Economy Analytics Hub. Created by KDH</p>
    </footer>
  </main>

  <script>
    // --- 데이터 저장소 ---
    const materials = {
      columns: [
        { date: "2026-04-15", title: "자산 가격의 허상과 화폐 가치의 실체", category: "지식한방 칼럼 ⑩" },
        { date: "2026-04-05", title: "상대적 박탈감을 만드는 통계의 함정", category: "지식한방 칼럼 ⑨" },
        { date: "2026-03-30", title: "자산을 지키는 리스크 관리 원칙", category: "지식한방 칼럼 ⑧" },
        { date: "2026-03-25", title: "위기 속의 기회를 잡는 유동성의 본질", category: "지식한방 칼럼 ⑦" },
        { date: "2026-03-14", title: "3월 2주차: 유가를 둘러싼 진실과 오해", category: "지식한방 정규 칼럼" },
        { date: "2026-03-07", title: "3월 1주차: 미국의 이란 공습과 경제적 파장", category: "지식한방 정규 칼럼" },
        { date: "2026-02-28", title: "2월 4주차: 금값까지 흔들린 이유와 4월 이후의 시장", category: "지식한방 정규 칼럼" },
        { date: "2026-02-21", title: "2월 4주차 ②: 코스피 6,000 돌파의 숨겨진 비밀", category: "지식한방 정규 칼럼" },
        { date: "2026-02-14", title: "2월 2주차: 금값 10% 폭락, 끝이 아닌 '숨 고르기'인 이유", category: "지식한방 정규 칼럼" },
        { date: "2026-01-31", title: "1월 5주차: 은(Silver). 새로운 에너지 표준의 핵심", category: "지식한방 정규 칼럼" },
        { date: "2026-01-24", title: "1월 4주차: AI 시대, ‘증강 인간’만이 살아남는다", category: "지식한방 정규 칼럼" },
        { date: "2026-01-15", title: "인구 구조의 변화가 가져올 경제적 충격", category: "지식한방 칼럼 ③" },
        { date: "2026-01-10", title: "돈을 찍어낼수록 당신은 가난해진다", category: "지식한방 칼럼 ②" },
        { date: "2026-01-05", title: "계속되는 환율 상승의 구조적인 원인", category: "지식한방 칼럼 ①" }
      ],
      lectures: [
        { date: "2026-05-01", title: "Part 3 - 2강: 미래는 절대 직선으로 오지 않는다", category: "정규 강의 정리본" },
        { date: "2026-04-28", title: "Part 3 - 1강: 정보 홍수 속에서 진짜 신호 찾기", category: "정규 강의 정리본" },
        { date: "2026-04-25", title: "Part 2 - 4강: 원화가치 몰락에 따른 대응 방법", category: "정규 강의 정리본" },
        { date: "2026-04-20", title: "Part 2 - 3강: 달러 가치의 미래", category: "정규 강의 정리본" },
        { date: "2026-04-15", title: "Part 2 - 2강: 왜 물가가 쉽게 잡히지 않는가", category: "정규 강의 정리본" },
        { date: "2026-04-10", title: "Part 2 - 1강: 돈 가격을 알아야 돈 번다", category: "정규 강의 정리본" },
        { date: "2026-04-05", title: "Part 1 - 5강: 돈의 미래, 누가 왕관을 차지할 것인가", category: "정규 강의 정리본" },
        { date: "2026-04-01", title: "Part 1 - 4강: 패권전쟁과 돈의 미래", category: "정규 강의 정리본" },
        { date: "2026-03-28", title: "Part 1 - 3강: 고물가가 뉴노멀이 된 시대", category: "정규 강의 정리본" },
        { date: "2026-03-25", title: "Part 1 - 2강: 역사 속 돈의 몰락", category: "정규 강의 정리본" }
      ]
    };

    const listView = document.getElementById("listView");
    const contentViewer = document.getElementById("contentViewer");
    const columnList = document.getElementById("columnList");
    const lectureList = document.getElementById("lectureList");
    const articleTitle = document.getElementById("articleTitle");
    const articleMeta = document.getElementById("articleMeta");
    const articleBody = document.getElementById("articleBody");

    function renderSection(data, container) {
      container.innerHTML = "";
      data.forEach((item, index) => {
        const div = document.createElement("div");
        div.className = "curriculum-item";
        div.innerHTML = `
          <div class="item-number">${data.length - index}</div>
          <div class="item-info">
            <h3>${item.title}</h3>
            <p>${item.date} | ${item.category}</p>
          </div>
        `;
        div.onclick = () => showArticle(item);
        container.appendChild(div);
      });
    }

    function showArticle(item) {
      articleTitle.textContent = item.title;
      articleMeta.textContent = `분류: ${item.category} | 작성일: ${item.date}`;
      articleBody.innerHTML = `
        <h3>학습 내용 요약</h3>
        <p>본 자료는 '${item.title}'에 대한 핵심 내용을 정리한 자료입니다.</p>
        <p>경제의 흐름을 파악하기 위해 핵심 키워드와 맥락을 중심으로 학습하시기 바랍니다.</p>
        <p>(실제 상세 내용은 워드 파일의 텍스트를 이곳에 업데이트하여 관리하세요.)</p>
      `;
      listView.style.display = "none";
      contentViewer.style.display = "block";
      window.scrollTo(0, 0);
    }

    function showList() {
      listView.style.display = "block";
      contentViewer.style.display = "none";
    }

    // 초기화
    renderSection(materials.columns, columnList);
    renderSection(materials.lectures, lectureList);

    // 다크모드 로직
    const modeToggle = document.getElementById("modeToggle");
    function initDarkMode() {
      const isDark = localStorage.getItem("darkMode") === "true" || 
                     (!localStorage.getItem("darkMode") && window.matchMedia("(prefers-color-scheme: dark)").matches);
      if (isDark) { document.body.classList.add("dark-mode"); modeToggle.textContent = "🌙"; }
    }
    modeToggle.addEventListener("click", () => {
      const isDark = document.body.classList.toggle("dark-mode");
      localStorage.setItem("darkMode", isDark);
      modeToggle.textContent = isDark ? "🌙" : "☀️";
    });
    initDarkMode();
  </script>
</body>
</html>
